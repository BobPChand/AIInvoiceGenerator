
<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=428,initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:428px;height:926px;background:#0A1628;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
.nav{height:96px;background:#0A1628;display:flex;align-items:flex-end;padding:0 20px 14px}
.nav-title{color:white;font-size:24px;font-weight:800}
.content{padding:20px;height:calc(926px - 96px - 83px);overflow:hidden}
.big-stat{background:#1C2E4A;border-radius:18px;padding:20px;margin-bottom:14px}
.big-stat-label{color:#8E9AB5;font-size:13px;font-weight:600}
.big-stat-value{color:white;font-size:32px;font-weight:800;margin-top:6px}
.big-stat-delta{color:#34C759;font-size:13px;font-weight:600;margin-top:4px}
.chart-card{background:#1C2E4A;border-radius:18px;padding:16px;margin-bottom:14px}
.chart-title{color:white;font-size:15px;font-weight:700;margin-bottom:12px}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;height:120px;gap:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.bar{width:100%;background:#4A90E2;border-radius:6px 6px 0 0;min-height:20px}
.bar-label{color:#8E9AB5;font-size:10px;font-weight:600}
.breakdown{display:flex;gap:10px;margin-bottom:14px}
.breakdown-card{flex:1;background:#1C2E4A;border-radius:14px;padding:14px;text-align:center}
.breakdown-label{color:#8E9AB5;font-size:11px;font-weight:600}
.breakdown-value{color:white;font-size:20px;font-weight:700;margin-top:4px}
.section-title{color:white;font-size:16px;font-weight:700;margin:6px 0 10px}
.client-row{background:#1C2E4A;border-radius:12px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
client-name{color:white;font-size:14px;font-weight:600}
client-amount{color:#4A90E2;font-size:14px;font-weight:700}
.tabbar{height:83px;background:#0A1628;display:flex;justify-content:space-around;align-items:flex-start;padding-top:8px;border-top:1px solid #1C2E4A}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-icon{font-size:22px;font-weight:700}
.tab-label{font-size:10px;font-weight:600}
.tab.active{color:#4A90E2}.tab.inactive{color:#8E8E93}
</style></head><body>
<div class="nav"><div class="nav-title">Insights</div></div>
<div class="content">
<div class="big-stat">
<div class="big-stat-label">YEAR TO DATE REVENUE</div>
<div class="big-stat-value">CA$84,250</div>
<div class="big-stat-delta">+22% vs last year</div>
</div>
<div class="chart-card">
<div class="chart-title">Monthly Revenue</div>
<div class="bar-chart">
<div class="bar-col"><div class="bar" style="height:60%"></div><div class="bar-label">Jan</div></div>
<div class="bar-col"><div class="bar" style="height:45%"></div><div class="bar-label">Feb</div></div>
<div class="bar-col"><div class="bar" style="height:70%"></div><div class="bar-label">Mar</div></div>
<div class="bar-col"><div class="bar" style="height:55%"></div><div class="bar-label">Apr</div></div>
<div class="bar-col"><div class="bar" style="height:80%"></div><div class="bar-label">May</div></div>
<div class="bar-col"><div class="bar" style="height:90%"></div><div class="bar-label">Jun</div></div>
<div class="bar-col"><div class="bar" style="height:75%"></div><div class="bar-label">Jul</div></div>
</div>
</div>
<div class="breakdown">
<div class="breakdown-card"><div class="breakdown-label">PAID</div><div class="breakdown-value" style="color:#34C759">CA$72K</div></div>
<div class="breakdown-card"><div class="breakdown-label">PENDING</div><div class="breakdown-value" style="color:#FF9500">CA$8K</div></div>
<div class="breakdown-card"><div class="breakdown-label">OVERDUE</div><div class="breakdown-value" style="color:#FF3B30">CA$4K</div></div>
</div>
<div class="section-title">Top Clients</div>
<div class="client-row"><div style="color:white;font-size:14px;font-weight:600">Acme Corp</div><div style="color:#4A90E2;font-size:14px;font-weight:700">CA$18.4K</div></div>
<div class="client-row"><div style="color:white;font-size:14px;font-weight:600">TechFlow Ltd</div><div style="color:#4A90E2;font-size:14px;font-weight:700">CA$12.1K</div></div>
</div>
<div class="tabbar">
<div class="tab inactive"><div class="tab-icon">Grid</div><div class="tab-label">Dashboard</div></div>
<div class="tab inactive"><div class="tab-icon">Doc</div><div class="tab-label">Invoice</div></div>
<div class="tab inactive"><div class="tab-icon">Rocket</div><div class="tab-label">Upgrade</div></div>
<div class="tab active"><div class="tab-icon">Chart</div><div class="tab-label">Insights</div></div>
<div class="tab inactive"><div class="tab-icon">Gear</div><div class="tab-label">Settings</div></div>
</div>
</body></html>
